<!doctype html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Уникальные окрасы</title>
<link rel="icon" href="favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="tabs">
    <a href="index.html" class="tab">Обычные окрасы</a>
    <a href="unique.html" class="tab active">Уникальные окрасы</a>
</div>

<div class="app">

<div class="panel">

<h2>Уникальный окрас</h2>

<label>Выберите окрас</label>

<select id="uniqueSelect">

    <option value="бенгал 28 29 30 31.png">
        Бенгал (28–31)
    </option>

    <option value="дымчатый леопард 32 33 34 35.png">
        Дымчатый леопард (32–35)
    </option>

    <option value="ликой 46.png">
        Ликой (46)
    </option>

    <option value="невская 36.png">
        Невская (36)
    </option>

    <option value="ориентал 45.png">
        Ориентал (45)
    </option>

    <option value="ориентал 47 48.png">
        Ориентал (47–48)
    </option>

    <option value="перс 37 38 39 40.png">
        Перс (37–40)
    </option>

    <option value="поинт 25 26.png">
        Поинт (25–26)
    </option>

    <option value="поинт 27.png">
        Поинт (27)
    </option>

    <option value="сфинкс 41 42 43 44.png">
        Сфинкс (41–44)
    </option>

</select>

<h2>Костюм</h2>

<input id="upload" type="file" accept="image/png">

<h2>Режим</h2>

<label class="check">
    <input type="radio" name="mode" value="inside" checked>
    В модельке
</label>

<label class="check">
    <input type="radio" name="mode" value="outside">
    За моделькой
</label>

<button id="crop">Обрезать</button>

</div>

<div class="right">

<div class="previews">

<div class="preview">
<h2>Модель + костюм</h2>
<canvas id="model" width="200" height="300"></canvas>
</div>

<div class="preview">
<h2>Результат</h2>
<canvas id="result" width="200" height="300"></canvas>
</div>

</div>

<div class="save">
<input id="filename" placeholder="Название файла">
<button id="download">Скачать PNG</button>
</div>

</div>

</div>
    
<footer class="footer">
    <a href="https://t.me/jillyan"
       target="_blank"
       rel="noopener noreferrer">
        Sorasuma
    </a>
    © 2026
</footer>
    
<script src="unique.js"></script>

</body>
</html>
