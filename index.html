<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Cat Costume Cutter</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="layout">

<div class="panel">

<h2>Выбор элементов</h2>

<h3>Уши</h3>
<label><input type="radio" name="ears"> Прямые</label>
<label><input type="radio" name="ears"> Вислые</label>
<label><input type="radio" name="ears"> Длинные</label>
<label><input type="radio" name="ears"> Раскосые</label>
<label><input type="radio" name="ears"> Кёрл</label>

<h3>Грива</h3>
<label><input type="radio" name="mane"> Умеренная</label>
<label><input type="radio" name="mane"> Пушистая</label>
<label><input type="radio" name="mane"> Пышная</label>

<h3>Хвост</h3>
<label><input type="radio" name="tail"> Куцый</label>
<label><input type="radio" name="tail"> Тонкий</label>
<label><input type="radio" name="tail"> Гладкий</label>
<label><input type="radio" name="tail"> Умеренный</label>
<label><input type="radio" name="tail"> Пушистый</label>
<label><input type="radio" name="tail"> Пышный</label>
<label><input type="radio" name="tail"> Беличий</label>

<h3>Загрузка костюма</h3>
<input type="file">

</div>


<div class="preview">

<h2>Модель + костюм</h2>
<canvas width="200" height="300"></canvas>

</div>


<div class="result">

<h2>Обрезанный костюм</h2>
<canvas width="200" height="300"></canvas>

</div>

</div>


<button class="download">Скачать PNG</button>

</body>
</html>
