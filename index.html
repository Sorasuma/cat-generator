<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Cat Costume Creator</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Cat Costume Creator</h1>

<div class="app">

<div class="panel">
<h2>Элементы</h2>

<h3>Уши</h3>
<div id="ears"></div>

<h3>Грива</h3>
<div id="mane"></div>

<h3>Хвост</h3>
<div id="tails"></div>

<h3>Костюм</h3>
<input type="file" id="costume" accept="image/png">

</div>


<div class="box">
<h2>Модель + костюм</h2>
<canvas id="model" width="200" height="300"></canvas>
</div>


<div class="box">
<h2>Обрезанный костюм</h2>
<canvas id="result" width="200" height="300"></canvas>
</div>

</div>

<button id="download">Скачать PNG</button>

<script src="script.js"></script>
</body>
</html>
