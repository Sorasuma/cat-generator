<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Cat Costume Creator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

<section class="panel">

<h2>Модель кота</h2>

<select id="ears">
<option>прямые</option>
<option>вислые</option>
<option>длинные</option>
<option>раскосые</option>
<option>кёрл</option>
</select>

<select id="mane">
<option>none</option>
<option>умеренная</option>
<option>пушистая</option>
<option>пышная</option>
</select>

<select id="tail">
<option>куцый</option>
<option>тонкий</option>
<option>гладкий</option>
<option>умеренный</option>
<option>пушистый</option>
<option>пышный</option>
<option>беличий</option>
</select>


<h2>Области обрезки</h2>

<label class="check"><input id="cutBody" checked type="checkbox"><span>Тело</span></label>
<label class="check"><input id="cutEars" checked type="checkbox"><span>Уши</span></label>
<label class="check"><input id="cutMane" checked type="checkbox"><span>Грива</span></label>
<label class="check"><input id="cutTail" checked type="checkbox"><span>Хвост</span></label>


<h2>Костюм</h2>

<input id="upload" type="file" accept="image/png">

<div class="mode">
<label class="check"><input type="radio" name="mode" value="inside" checked><span>Оставить выбранную область</span></label>
<label class="check"><input type="radio" name="mode" value="outside"><span>Удалить выбранную область</span></label>
</div>

<button id="crop">Обрезать</button>

</section>


<section class="preview">
<h2>Модель + костюм</h2>
<canvas id="model" width="200" height="300"></canvas>
</section>


<section class="preview">
<h2>Результат</h2>
<canvas id="result" width="200" height="300"></canvas>
</section>

</div>


<div class="save">
<input id="filename" placeholder="Название файла">
<button id="download">Скачать PNG</button>
</div>

<script src="script.js"></script>
</body>
</html>
