<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Cat Costume Creator</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Cat Costume Creator</h1>

<div class="layout">

<div class="panel">

<h2>Модель кота</h2>

<label>Уши</label>
<select id="ears">
<option>прямые</option>
<option>вислые</option>
<option>длинные</option>
<option>раскосые</option>
<option>кёрл</option>
</select>

<label>Грива</label>
<select id="mane">
<option>none</option>
<option>умеренная</option>
<option>пушистая</option>
<option>пышная</option>
</select>

<label>Хвост</label>
<select id="tail">
<option>куцый</option>
<option>тонкий</option>
<option>гладкий</option>
<option>умеренный</option>
<option>пушистый</option>
<option>пышный</option>
<option>беличий</option>
</select>


<h2>Области обрезки</h2>

<label><input id="cutBody" type="checkbox" checked> Тело</label>
<label><input id="cutEars" type="checkbox" checked> Уши</label>
<label><input id="cutMane" type="checkbox" checked> Грива</label>
<label><input id="cutTail" type="checkbox" checked> Хвост</label>


<h2>Костюм</h2>
<input id="upload" type="file" accept="image/png">

<button id="crop">Обрезать костюм</button>

</div>


<div class="window">
<h2>Модель + костюм</h2>
<canvas id="preview" width="200" height="300"></canvas>
</div>


<div class="window">
<h2>Обрезанный костюм</h2>
<canvas id="result" width="200" height="300"></canvas>
</div>

</div>


<div class="save">
<input id="filename" placeholder="Название файла">
<button id="save">Скачать PNG</button>
</div>


<script src="script.js"></script>
</body>
</html>
