<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Обрезалка</title>

<link rel="icon" href="favicon.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

<div class="panel">

<h2>Модель кота</h2>

<label>Уши</label>
<select id="ears">
<option>прямые</option>
<option>вислые</option>
<option>длинные</option>
<option>раскосые</option>
<option>кёрл</option>
</select>

<label>Щеки</label>
<select id="cheeks">
<option>none</option>
<option>короткая</option>
<option>умеренная</option>
<option>длинная</option>
</select>

<label>Грива</label>
<select id="mane">
<option>none</option>
<option>умеренная</option>
<option>пушистая</option>
<option>пышная</option>
</select>

<label>Хвост</label>
<select id="tail">
<option>куцый</option>
<option>тонкий</option>
<option>гладкий</option>
<option>умеренный</option>
<option>пушистый</option>
<option>пышный</option>
<option>беличий</option>
</select>


<h2>Области обрезки</h2>

<label class="check"><input id="cutBody" checked type="checkbox">Тело</label>
<label class="check"><input id="cutCheeks" checked type="checkbox">Щеки</label>
<label class="check"><input id="cutEars" checked type="checkbox">Уши</label>
<label class="check"><input id="cutMane" checked type="checkbox">Грива</label>
<label class="check"><input id="cutTail" checked type="checkbox">Хвост</label>


<h2>Костюм</h2>
<input id="upload" type="file" accept="image/png">


<h2>Режим</h2>

<label class="check">
<input type="radio" name="mode" value="inside" checked>
<span>В модельке</span>
</label>

<label class="check">
<input type="radio" name="mode" value="outside">
<span>За моделькой</span>
</label>


<button id="crop">Обрезать</button>

</div>


<div class="preview">
<h2>Модель + костюм</h2>
<canvas id="model" width="200" height="300"></canvas>
</div>


<div class="preview">
<h2>Результат</h2>
<canvas id="result" width="200" height="300"></canvas>
</div>

</div>


<div class="save">
<input id="filename" placeholder="Название файла">
<button id="download">Скачать PNG</button>
</div>


<script src="script.js"></script>
</body>
</html>
