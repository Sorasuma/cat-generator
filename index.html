<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Cat Costume Creator</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Cat Costume Creator</h1>

<div class="app">

<div class="panel">
<h2>Область вырезания</h2>

<label><input id="useBody" type="checkbox" checked> Тело</label>
<label><input id="useEars" type="checkbox" checked> Уши</label>
<select id="ears">
<option>прямые</option>
<option>вислые</option>
<option>длинные</option>
<option>раскосые</option>
<option>кёрл</option>
</select>

<label><input id="useMane" type="checkbox" checked> Грива</label>
<select id="mane">
<option>none</option>
<option>умеренная</option>
<option>пушистая</option>
<option>пышная</option>
</select>

<label><input id="useTail" type="checkbox" checked> Хвост</label>
<select id="tail">
<option>куцый</option>
<option>тонкий</option>
<option>гладкий</option>
<option>умеренный</option>
<option>пушистый</option>
<option>пышный</option>
<option>беличий</option>
</select>

<h2>Режим маски</h2>
<label>
<input id="alphaMode" type="checkbox" checked>
Использовать прозрачность PNG
</label>

<h2>Костюм</h2>
<input type="file" id="costume" accept="image/png">

</div>

<div class="box">
<h2>Модель + костюм</h2>
<canvas id="model" width="200" height="300"></canvas>
</div>

<div class="box">
<h2>Вырезанный костюм</h2>
<canvas id="result" width="200" height="300"></canvas>
</div>

</div>

<div class="save">
<input id="filename" placeholder="Название файла">
<button id="download">Скачать PNG</button>
</div>

<script src="script.js"></script>
</body>
</html>
