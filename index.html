<!doctype html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Обрезалка</title>
<link rel="icon" href="favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="tabs">
    <a href="index.html" class="tab active">Обычные окрасы</a>
    <a href="unique.html" class="tab">Уникальные окрасы</a>
</div>

<div class="app">
<div class="panel">
<h2>Модель кота</h2>

<label>Уши</label>
<select id="ears">
<option>прямые</option><option>вислые</option><option>длинные</option><option>раскосые</option><option>кёрл</option>
</select>

<label>Щеки</label>
<select id="cheeks">
<option>none</option><option>короткая</option><option>умеренная</option><option>длинная</option>
</select>

<label>Грива</label>
<select id="mane">
<option>none</option><option>умеренная</option><option>пушистая</option><option>пышная</option>
</select>

<label>Хвост</label>
<select id="tail">
<option>куцый</option><option>тонкий</option><option>гладкий</option><option>умеренный</option><option>пушистый</option><option>пышный</option><option>беличий</option>
</select>

<h2>Области обрезки</h2>
<label class="check"><input id="cutBody" type="checkbox" checked>Тело</label>
<label class="check"><input id="cutCheeks" type="checkbox" checked>Щеки</label>
<label class="check"><input id="cutEars" type="checkbox" checked>Уши</label>
<label class="check"><input id="cutMane" type="checkbox" checked>Грива</label>
<label class="check"><input id="cutTail" type="checkbox" checked>Хвост</label>

<h2>Костюм</h2>
<input id="upload" type="file" accept="image/png">

<h2>Режим</h2>
<label class="check"><input type="radio" name="mode" value="inside" checked>В модельке</label>
<label class="check"><input type="radio" name="mode" value="outside">За моделькой</label>

<button id="crop">Обрезать</button>
</div>

<div class="right">
<div class="previews">
<div class="preview">
<h2>Модель + костюм</h2>
<canvas id="model" width="200" height="300"></canvas>
</div>
<div class="preview">
<h2>Результат</h2>
<canvas id="result" width="200" height="300"></canvas>
</div>
</div>

<div class="save">
<input id="filename" placeholder="Название файла">
<button id="download">Скачать PNG</button>
</div>
</div>
    </div>

</div>
    
<footer class="footer">
    <a href="https://t.me/jillyan" target="_blank">
        Sorasuma
    </a>
    © 2026
</footer>
    
<script src="script.js"></script>
</body>
</html>
