<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Cat Costume Creator</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Cat Costume Creator</h1>

<div class="app">

<div class="panel">

<h2>Области обрезки</h2>

<label class="check">
<input id="useBody" type="checkbox" checked>
<span>Тело</span>
</label>

<label class="check">
<input id="useEars" type="checkbox" checked>
<span>Уши</span>
</label>
<select id="ears">
<option>прямые</option>
<option>вислые</option>
<option>длинные</option>
<option>раскосые</option>
<option>кёрл</option>
</select>

<label class="check">
<input id="useMane" type="checkbox" checked>
<span>Грива</span>
</label>
<select id="mane">
<option>none</option>
<option>умеренная</option>
<option>пушистая</option>
<option>пышная</option>
</select>

<label class="check">
<input id="useTail" type="checkbox" checked>
<span>Хвост</span>
</label>
<select id="tail">
<option>куцый</option>
<option>тонкий</option>
<option>гладкий</option>
<option>умеренный</option>
<option>пушистый</option>
<option>пышный</option>
<option>беличий</option>
</select>

<h2>Костюм</h2>
<input type="file" id="costume" accept="image/png">

<button id="crop">Обрезать</button>

</div>


<div class="box">
<h2>Модель + костюм</h2>
<canvas id="model" width="200" height="300"></canvas>
</div>


<div class="box">
<h2>Обрезанный костюм</h2>
<canvas id="result" width="200" height="300"></canvas>
</div>

</div>

<div id="summary">Выбрано: ничего</div>

<div class="save">
<input id="filename" placeholder="Название файла">
<button id="download">Скачать PNG</button>
</div>

<script src="script.js"></script>
</body>
</html>
